<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0a0a0a;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .avatar-ring {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 2.5px solid #d4a843;
    padding: 3px;
    background: #0a0a0a;
    margin-bottom: 1.25rem;
    overflow: hidden;
  }
  .avatar-ring img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
  }
  .username {
    font-family: 'Rajdhani', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
    text-align: center;
  }
  .username span { color: #d4a843; }
  .tagline {
    font-size: 12px;
    color: #666;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 2rem;
    text-align: center;
  }
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .link-btn {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid #222;
    background: #111;
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.18s ease;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .link-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent, #d4a843);
    border-radius: 3px 0 0 3px;
  }
  .link-btn:hover {
    background: #181818;
    border-color: var(--accent, #d4a843);
    transform: translateX(3px);
  }
  .link-btn .icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--icon-bg, #1e1e1e);
  }
  .link-btn .icon svg { width: 18px; height: 18px; }
  .link-btn .label { flex: 1; }
  .link-btn .arrow { color: #333; font-size: 16px; transition: color 0.18s; }
  .link-btn:hover .arrow { color: var(--accent, #d4a843); }
  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #444;
    margin: 1.5rem 0 0.75rem;
    align-self: flex-start;
    padding-left: 2px;
  }
  .footer {
    margin-top: 2.5rem;
    font-size: 11px;
    color: #333;
    letter-spacing: 1px;
  }
</style>
</head>
